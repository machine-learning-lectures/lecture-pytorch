project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - materials/*.qmd
    - labs/lab-*.qmd
    - pytorch/notebooks/*.qmd
  resources:
    - src/templates/*.ipynb
    - src/solutions/*.ipynb

website:
